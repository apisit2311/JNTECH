<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JN electric&Technology</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        input[type=number] { 
            -moz-appearance: textfield; 
        }
        :root {
            --primary-color: #1e3a8a; /* สีน้ำเงินแซฟไฟร์ */
            --accent-color: #3b82f6; /* สีฟ้าสว่าง (เอาไว้เน้น) */
            --text-main: #0f172a; 
            --text-muted: #475569;
            --bg-color: #f8fafc;
            --border-color: #cbd5e1;
        }

        body { font-family: 'Sarabun', sans-serif; color: var(--text-main); line-height: 1.5; background-color: var(--bg-color); padding: 30px 20px; }
        
        .document-container { 
            width: 210mm; 
            min-height: 297mm; 
            margin: 0 auto; 
            background: #fff; 
            padding: 20mm; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            box-sizing: border-box;
            position: relative; 
        }
        
        input[type="text"], input[type="number"], textarea, .editable-desc, select {
            font-family: 'Sarabun', sans-serif; font-size: 14px; color: var(--text-main);
            border: 1px dashed transparent; border-radius: 2px; padding: 4px 6px; width: 100%; box-sizing: border-box;
            background-color: transparent; transition: all 0.2s ease;
        }
        input:hover, textarea:hover, .editable-desc:hover, select:hover { background-color: #f1f5f9; border-color: #e2e8f0; }
        input:focus, textarea:focus, .editable-desc:focus, select:focus { 
            border: 1px solid var(--accent-color); outline: none; background-color: #fff;
        }
        textarea { resize: vertical; overflow: hidden; }

        select.unit-select { cursor: pointer; text-align: center; text-align-last: center; }
        select.unit-select optgroup { text-align: left; font-weight: bold; background: #eee; }
        select.unit-select option { text-align: left; background: #fff; }

        .editable-desc { min-height: 30px; word-wrap: break-word; white-space: pre-wrap; padding-top: 8px;}
        .editable-desc:empty:before { content: attr(data-placeholder); color: #94a3b8; }

        /* เลย์เอาต์ใหม่: ส่วนหัวบนสุด (Title & Meta) */
        .top-section { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; border-bottom: 3px solid var(--primary-color); padding-bottom: 20px; }
        
        .title-area { width: 50%; }
        .doc-title-editable { 
            font-size: 38px !important; 
            font-weight: 700; 
            color: var(--primary-color); 
            text-align: left;
            padding: 10px 10px 0 0; 
            line-height: 1.1; 
            display: inline-block;
            outline: none;
            border: 1px dashed transparent;
            letter-spacing: 1px;
        }
        .doc-title-editable:hover { border-color: var(--border-color); background-color: #f1f5f9; }
        .doc-title-editable:focus { border-color: var(--accent-color); background-color: #fff; }

        .meta-area { width: 45%; text-align: right; }
        .meta-area table { width: 100%; border-spacing: 0 5px; }
        .meta-area td { vertical-align: middle; }
        .meta-area td:first-child { font-weight: 600; width: 45%; color: var(--text-muted); text-transform: uppercase; font-size: 13px;}
        .meta-area input { text-align: right; font-weight: 600; font-size: 15px;}

        /* เลย์เอาต์ใหม่: ข้อมูลผู้ส่งและผู้รับขนานกัน */
        .address-section { display: flex; justify-content: space-between; margin-bottom: 40px; }
        .company-area, .customer-area { width: 48%; }
        .section-label { 
            font-size: 13px; color: var(--text-muted); font-weight: 700; 
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
            border-bottom: 1px solid var(--border-color); padding-bottom: 5px;
        }
        
        /* สไตล์สำหรับโลโก้ */
        .company-logo {
            max-width: 120px; /* ปรับขนาดความกว้างโลโก้ได้ตรงนี้ */
            height: auto;
            margin-bottom: 5px;
            display: block;
        }

        /* ตารางสไตล์บัญชีคลาสสิก (เส้นขอบคู่) */
        .items-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; table-layout: fixed; border-bottom: 2px solid var(--primary-color); }
        .items-table th { 
            background-color: #fff; color: var(--primary-color); 
            padding: 12px 8px; text-align: left; font-size: 14px; font-weight: 700; 
            border-top: 2px solid var(--primary-color); 
            border-bottom: 2px solid var(--primary-color);
        }
        .items-table th.text-center, .items-table td.text-center { text-align: center; }
        .items-table th.text-right, .items-table td.text-right { text-align: right; }
        .items-table td { padding: 10px 8px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
        .row-number { font-weight: 600; color: var(--text-muted); padding-top: 15px !important; }
        
        .btn { padding: 8px 16px; cursor: pointer; font-family: 'Sarabun'; border: none; border-radius: 4px; font-weight: 600; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn-add { background-color: var(--primary-color); color: white; border-radius: 20px; padding: 8px 20px; box-shadow: 0 4px 6px rgba(30, 58, 138, 0.2);}
        .btn-del { background-color: #ef4444; color: white; padding: 4px 10px; font-size: 12px; margin-top: 4px; border-radius: 4px; }
        
        .top-controls { position: fixed; top: 20px; right: 20px; z-index: 100; display: flex; gap: 10px; background: rgba(30,58,138,0.95); backdrop-filter: blur(4px); padding: 12px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); flex-wrap: wrap; max-width: 450px;}
        .btn-print { background-color: #3b82f6; color: white; font-size: 14px; }
        .btn-save { background-color: #f59e0b; color: white; font-size: 14px; }
        .btn-load { background-color: #8b5cf6; color: white; font-size: 14px; }
        .btn-excel { background-color: #10b981; color: white; font-size: 14px; } /* สีเขียว Excel */
        .btn-cloud-save { background-color: #06b6d4; color: white; font-size: 14px; }
        .btn-cloud-load { background-color: #6366f1; color: white; font-size: 14px; }
        .btn-logout { background-color: #64748b; color: white; font-size: 14px; }

        /* สรุปยอด */
        .summary-section { display: flex; justify-content: flex-end; margin-bottom: 40px; margin-top: 10px; }
        .summary-table { width: 50%; border-collapse: collapse; }
        .summary-table td { padding: 8px 12px; font-size: 15px; border-bottom: 1px solid var(--border-color); }
        .summary-table tr.total td { font-weight: 700; color: var(--primary-color); font-size: 18px; border-bottom: none; border-top: 2px solid var(--primary-color); background-color: #f8fafc; }

        .footer-signatures { display: flex; justify-content: space-between; margin-top: 60px; text-align: center; }
        .signature-box { width: 35%; }
        .signature-line { border-bottom: 1px solid var(--text-main); margin: 40px auto 10px; width: 100%; }
        
        .toggle-box { cursor: pointer; display: flex; align-items: center; justify-content: flex-end; gap: 6px; font-size: 13px; color: var(--text-muted); margin-top: 4px; font-weight: 500;}
        .toggle-box input { width: auto; transform: scale(1.1); cursor: pointer; margin: 0; }

        .drag-handle { cursor: grab; color: #cbd5e1; font-size: 18px; padding-top: 12px !important; user-select: none; }
        .drag-handle:active { cursor: grabbing; color: var(--primary-color); }
        tr.dragging { opacity: 0.6; background-color: #eff6ff; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }

        /* ระบบสไตล์สำหรับกล่อง Login บังหน้าจอ */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9); z-index: 10000;
            display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: #fff; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); text-align: center;
        }
        .login-card h2 { color: var(--primary-color); margin-bottom: 20px; font-size: 24px; }
        .login-card input[type="password"] {
            border: 1px solid var(--border-color); background: #f8fafc; padding: 12px;
            border-radius: 6px; width: 100%; font-size: 16px; text-align: center; margin-bottom: 15px;
        }
        .login-card input[type="password"]:focus { border-color: var(--primary-color); background: #fff; outline: none; }
        .login-card .btn-submit { background: var(--primary-color); color: #fff; width: 100%; padding: 12px; font-size: 16px; border-radius: 6px; }

        @media print {
            body { background: #fff; padding: 0; }
            .document-container { width: 100%; height: auto; min-height: auto; box-shadow: none; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            
            input, textarea, .editable-desc, .doc-title-editable, select { 
                border: none !important; background: transparent !important; padding: 0 !important; box-shadow: none !important;
                appearance: none; -webkit-appearance: none; -moz-appearance: none;
            }
            .summary-table tr.total td { background-color: transparent; }
            
            select::-ms-expand { display: none; } 
            .editable-desc { min-height: auto; }
            textarea { height: auto !important; }
            tr { page-break-inside: avoid; }
            ::-webkit-input-placeholder { color: transparent !important; }
            ::placeholder { color: transparent !important; }
            .editable-desc:empty:before { color: transparent !important; }
            #login-overlay { display: none !important; }
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2>JN Electric System</h2>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 15px;">กรุณากรอกรหัสผ่านเพื่อเข้าใช้งานออนไลน์</p>
        <input type="password" id="pass-input" placeholder="รหัสผ่านระบบ">
        <button class="btn btn-submit" onclick="submitLogin()">🔓 เข้าสู่ระบบ</button>
    </div>
</div>

<div class="top-controls no-print" id="controls-panel" style="display: none;">
    <button class="btn btn-cloud-save" onclick="saveToCloud()">☁️ บันทึกลงระบบคลาวด์</button>
    <button class="btn btn-cloud-load" onclick="loadFromCloud()">☁️ ดึงจากคลาวด์</button>
    <button class="btn btn-save" onclick="saveData()">💾 บันทึกไฟล์งาน (JSON)</button>
    <button class="btn btn-load" onclick="document.getElementById('file-input').click()">📂 เปิดไฟล์งาน (JSON)</button>
    <input type="file" id="file-input" accept=".json" style="display: none;" onchange="loadData(event)">
    <button class="btn btn-excel" onclick="exportToExcel()">📊 ส่งออกเป็น Excel</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ พิมพ์ PDF</button>
    <button class="btn btn-logout" onclick="logout()">🚪 ออกระบบ</button>
</div>

<div class="document-container" id="main-app" style="display: none;">
    
    <div class="top-section">
        <div class="title-area">
            <div contenteditable="true" class="doc-title-editable" id="docType" oninput="updateDocTypeSync()">...</div><br>
            <input type="text" id="docSubTitle" style="text-align: left; font-weight: 600; border:none; color:var(--text-muted); font-size: 16px; padding: 0;" value="(QUOTATION)">
        </div>
        <div class="meta-area">
            <table>
                <tr>
                    <td>เลขที่เอกสาร (NO.)</td>
                    <td><input type="text" id="doc-num" value="QUO-CO26001" style="color: var(--primary-color);"></td>
                </tr>
                <tr>
                    <td>วันที่ (DATE)</td>
                    <td>
                        <input type="text" id="doc-date" value="" placeholder="ระบุวันที่">
                        <label class="toggle-box no-print"><input type="checkbox" id="blank-date" onchange="toggleDate()"> เว้นว่าง</label>
                    </td>
                </tr>
                <tr>
                    <td>ครบกำหนด (DUE DATE)</td>
                    <td><input type="text" id="due-date" value="" placeholder="ปล่อยว่างได้"></td>
                </tr>
            </table>
        </div>
    </div>

    <div class="address-section">
        <div class="company-area">
            <div class="section-label">ผู้ออกเอกสาร (FROM)</div>
            
            <img src="logo.png" alt="JN Electric Logo" class="company-logo">

           <textarea rows="4" style="color: var(--text-muted); padding-left: 0;">101/1 ม.1 ต.หนองนาคำ อ.เมือง&#10;จ.อุดรธานี 41000&#10;โทร: 083-417-5143 &#10;Line: apisit2311</textarea>
        </div>
        <div class="customer-area">
            <div class="section-label">ลูกค้า (BILL TO)</div>
            <input type="text" id="customer-name" value="บริษัท ลูกค้าองค์กร จำกัด" style="font-weight: 700; font-size: 18px; padding-left: 0;">
            <textarea id="customer-address" rows="4" style="padding-left: 0;">888 ถนนรัชดาภิเษก แขวงดินแดง&#10;เขตดินแดง กรุงเทพฯ 10400&#10;เลขประจำตัวผู้เสียภาษี: 0104444444444&#10;โทร: 02-888-9999</textarea>
        </div>
    </div>

    <table class="items-table" id="invoice-table">
        <thead>
             <tr>
                <th class="no-print text-center" style="width: 2%;"></th>
                <th class="no-print text-center" style="width: 5%;">ลบ</th>
                <th class="text-center" style="width: 5%;">ลำดับ</th>
                <th style="width: 47%;">รายการ</th> 
                <th class="text-center" style="width: 8%;">จำนวน</th>
                <th class="text-center" style="width: 12%;">หน่วย</th> 
                <th class="text-right" style="width: 12%;">ราคา/หน่วย</th>
                <th class="text-right" style="width: 14%;">จำนวนเงิน</th>
            </tr>
        </thead>
        <tbody id="items-body">
            </tbody>
    </table>
    
    <button class="btn btn-add no-print" onclick="addRow()">+ เพิ่มรายการ</button>

    <div class="summary-section">
        <table class="summary-table">
            <tr>
                <td style="color: var(--text-muted);">รวมเป็นเงิน (SUBTOTAL)</td>
                <td class="text-right" id="subtotal">0.00</td>
            </tr>
            <tr class="total">
                <td>ยอดชำระสุทธิ (TOTAL)</td>
                <td class="text-right" id="grand-total">0.00</td>
            </tr>
        </table>
    </div>

    <div class="footer-signatures">
        <div class="signature-box">
            <div class="signature-line"></div>
            <input type="text" id="sig-left" value="ผู้อนุมัติสั่งซื้อ" style="text-align: center; font-weight: 600; font-size: 15px;">
            <input type="text" value="วันที่ _____/_____/_____" style="text-align: center; color: var(--text-muted); font-size: 13px;">
        </div>
        <div class="signature-box">
            <div class="signature-line"></div>
            <input type="text" id="sig-right" value="ผู้เสนอราคา" style="text-align: center; font-weight: 600; font-size: 15px;">
            <input type="text" value="วันที่ _____/_____/_____" style="text-align: center; color: var(--text-muted); font-size: 13px;">
        </div>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmR7Z5GfLb2-zJd9R1YK-VQI7VmdBqkFx3qfoWxxAx9svYVHL6sNXgLlneJR99J6rYjw/exec";

    const unitDropdownHTML = `
        <select class="unit-select text-center" onchange="checkCustomUnit(this)">
            <option value="ตัว">ตัว</option>
            <option value="ชิ้น">ชิ้น</option>
            <option value="อัน">อัน</option>
            <option value="ชุด">ชุด</option>
            <option value="เครื่อง">เครื่อง</option>
            <option value="แผง">แผง</option>
            <option value="ลูก">ลูก</option>
            <option value="เมตร">เมตร</option>
            <option value="ม้วน">ม้วน</option>
            <option value="เส้น">เส้น</option>
            <option value="ท่อน">ท่อน</option>
            <option value="แผ่น">แผ่น</option>
            <option value="กล่อง">กล่อง</option>
            <option value="แพ็ค">แพ็ค</option>
            <option value="ถุง">ถุง</option>
            <option value="ถัง">ถัง</option>
            <option value="แกลลอน">แกลลอน</option>
            <option value="งาน">งาน</option>
            <option value="จุด">จุด</option>
            <option value="เหมา">เหมา</option>
            <option value="ครั้ง">ครั้ง</option>
            <option value="วัน">วัน</option>
            <option value="เดือน">เดือน</option>
            <option value="CUSTOM_UNIT">++ เพิ่มหน่วยเอง ++</option>
        </select>
    `;

    function checkSession() {
        const token = localStorage.getItem("jn_session_token");
        if (token) {
            document.getElementById("login-overlay").style.display = "none";
            document.getElementById("controls-panel").style.display = "flex";
            document.getElementById("main-app").style.display = "block";
            return true;
        } else {
            document.getElementById("login-overlay").style.display = "flex";
            document.getElementById("controls-panel").style.display = "none";
            document.getElementById("main-app").style.display = "none";
            return false;
        }
    }

    function submitLogin() {
        const password = document.getElementById("pass-input").value;
        if(!password) { alert("กรุณากรอกรหัสผ่านด้วยครับ"); return; }
        
        fetch(APPS_SCRIPT_URL, {
            method: "POST",
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify({ action: "login", password: password })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                localStorage.setItem("jn_session_token", data.token);
                checkSession();
            } else {
                alert(data.message);
            }
        })
        .catch(err => {
            alert("เชื่อมต่อ API ล้มเหลว ตรวจสอบ URL ของ Apps Script หรือสิทธิ์การเข้าถึง");
            console.error(err);
        });
    }

    function logout() {
        localStorage.removeItem("jn_session_token");
        checkSession();
    }

    function saveToCloud() {
        const token = localStorage.getItem("jn_session_token");
        const rawPayload = {
            docType: document.getElementById('docType').innerText,
            docNum: document.getElementById('doc-num').value,
            docDate: document.getElementById('doc-date').value,
            dueDate: document.getElementById('due-date').value,
            customerName: document.getElementById('customer-name').value,
            customerAddress: document.getElementById('customer-address').value,
            grandTotal: document.getElementById('grand-total').innerText,
            items: []
        };

        document.querySelectorAll('#items-body tr').forEach(tr => {
            rawPayload.items.push({
                desc: tr.querySelector('.editable-desc').innerText,
                qty: tr.querySelector('.qty').value,
                unit: tr.querySelector('.unit-select').value,
                price: tr.querySelector('.price').value
            });
        });

        fetch(APPS_SCRIPT_URL, {
            method: "POST",
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify({ action: "save", token: token, data: rawPayload })
        })
        .then(res => res.json())
        .then(data => {
            if (data.authError) { alert(data.message); logout(); }
            else if (data.success) { alert("☁️ ออนไลน์: " + data.message); }
            else { alert("เกิดข้อผิดพลาด: " + data.message); }
        })
        .catch(err => alert("ไม่สามารถบันทึกออนไลน์ได้ในขณะนี้"));
    }

    function loadFromCloud() {
        const token = localStorage.getItem("jn_session_token");
        const docNum = document.getElementById('doc-num').value;
        if(!docNum) { alert("กรุณากรอกเลขที่เอกสารที่ต้องการค้นหาก่อนครับ"); return; }

        fetch(APPS_SCRIPT_URL, {
            method: "POST",
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify({ action: "load", token: token, docNum: docNum })
        })
        .then(res => res.json())
        .then(data => {
            if (data.authError) { alert(data.message); logout(); }
            else if (data.success) {
                const cloudData = data.data;
                document.getElementById('docType').innerText = cloudData.docType || "ใบเสนอราคา";
                document.getElementById('doc-num').value = cloudData.docNum || "";
                document.getElementById('doc-date').value = cloudData.docDate || "";
                document.getElementById('due-date').value = cloudData.dueDate || "";
                document.getElementById('customer-name').value = cloudData.customerName || "";
                document.getElementById('customer-address').value = cloudData.customerAddress || "";

                const tbody = document.getElementById('items-body');
                tbody.innerHTML = '';
                
                if(cloudData.items && cloudData.items.length > 0) {
                    cloudData.items.forEach(item => addRow(item));
                } else {
                    addRow(); 
                }
                updateDocTypeSync();
                calculateTotal();
                alert("☁️ ออนไลน์: ดึงข้อมูลสำเร็จเรียบร้อย!");
            } else {
                alert("❌ " + data.message);
            }
        })
        .catch(err => alert("ไม่สามารถเชื่อมต่อคลาวด์ได้ในขณะนี้"));
    }

    function checkCustomUnit(selectEl) {
        if (selectEl.value === "CUSTOM_UNIT") {
            const custom = prompt("กรุณาระบุหน่วยนับที่ต้องการเพิ่ม:");
            if (custom && custom.trim() !== "") {
                const cleanValue = custom.trim();
                let exists = false;
                for (let i = 0; i < selectEl.options.length; i++) {
                    if (selectEl.options[i].value === cleanValue) {
                        selectEl.value = cleanValue;
                        exists = true;
                        break;
                    }
                }
                if (!exists) {
                    const newOpt = document.createElement("option");
                    newOpt.value = cleanValue;
                    newOpt.textContent = cleanValue;
                    selectEl.insertBefore(newOpt, selectEl.options[selectEl.options.length - 1]);
                    selectEl.value = cleanValue;
                }
            } else {
                selectEl.value = selectEl.options[0].value;
            }
        }
    }

    function getTodayThai() {
        const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        const d = new Date();
        return d.getDate() + ' ' + months[d.getMonth()] + ' ' + (d.getFullYear() + 543);
    }

    function updateDocTypeSync() {
        const docText = document.getElementById('docType').innerText;
        const subTitle = document.getElementById('docSubTitle');
        const sigLeft = document.getElementById('sig-left');
        const sigRight = document.getElementById('sig-right');
        
        if (docText.includes("เสนอราคา")) {
            subTitle.value = "(QUOTATION)";
            sigLeft.value = "ผู้อนุมัติสั่งซื้อ"; sigRight.value = "ผู้เสนอราคา";
        } else if (docText.includes("รับเงิน") || docText.includes("เสร็จ")) {
            subTitle.value = "(RECEIPT)";
            sigLeft.value = "ผู้ชำระเงิน"; sigRight.value = "ผู้รับเงิน";
        } else {
            subTitle.value = "(INVOICE)";
            sigLeft.value = "ผู้รับสินค้า / บริการ"; sigRight.value = "ผู้ออกเอกสาร";
        }
    }

    function toggleDate() {
        const dateInput = document.getElementById('doc-date');
        const isBlank = document.getElementById('blank-date').checked;
        if (isBlank) { dateInput.dataset.savedDate = dateInput.value; dateInput.value = ""; } 
        else { dateInput.value = dateInput.dataset.savedDate || getTodayThai(); }
    }

    function updateRowNumbers() {
        const rows = document.querySelectorAll('#items-body tr');
        rows.forEach((row, index) => { row.querySelector('.row-number').innerText = index + 1; });
    }

    function calculateTotal() {
        let subtotal = 0;
        const rows = document.querySelectorAll('#items-body tr');
        rows.forEach(row => {
            const qty = parseFloat(row.querySelector('.qty').value) || 0;
            const price = parseFloat(row.querySelector('.price').value) || 0;
            const total = qty * price;
            row.querySelector('.row-total').innerText = total.toLocaleString('th-TH', {minimumFractionDigits: 2});
            subtotal += total;
        });
        document.getElementById('subtotal').innerText = subtotal.toLocaleString('th-TH', {minimumFractionDigits: 2});
        document.getElementById('grand-total').innerText = subtotal.toLocaleString('th-TH', {minimumFractionDigits: 2});
    }

    function addRow(data = null) {
        const tbody = document.getElementById('items-body');
        const tr = document.createElement('tr');
        tr.className = 'item-row';
        
        const desc = data ? data.desc : '';
        const qty = data ? data.qty : 1;
        const unit = data ? data.unit : 'ตัว';
        const price = data ? data.price : 0;

        tr.innerHTML = `
            <td class="no-print text-center drag-handle" title="คลิกค้างเพื่อลาก">⋮⋮</td>
            <td class="no-print text-center"><button class="btn btn-del" onclick="deleteRow(this)">ลบ</button></td>
            <td class="text-center row-number"></td>
            <td><div contenteditable="true" class="editable-desc" data-placeholder="ระบุรายละเอียด...">${desc}</div></td>
            <td><input type="number" class="qty text-center" value="${qty}" min="1" oninput="calculateTotal()"></td>
            <td>${unitDropdownHTML}</td>
            <td><input type="number" class="price text-right" value="${price}" min="0" oninput="calculateTotal()"></td>
            <td class="text-right row-total" style="padding-top: 14px;">0.00</td>
        `;
        tbody.appendChild(tr);
        
        const unitSelect = tr.querySelector('.unit-select');
        
        if (data && unit) {
            let hasUnit = false;
            for (let i = 0; i < unitSelect.options.length; i++) {
                if (unitSelect.options[i].value === unit) {
                    hasUnit = true;
                    break;
                }
            }
            if (!hasUnit) {
                const opt = document.createElement("option");
                opt.value = unit;
                opt.textContent = unit;
                unitSelect.insertBefore(opt, unitSelect.options[unitSelect.options.length - 1]);
            }
        }
        
        unitSelect.value = unit;

        attachDragEvents(tr);
        updateRowNumbers(); 
        calculateTotal();
        
        if(!data) tr.querySelector('.editable-desc').focus();
    }

    function deleteRow(button) { button.closest('tr').remove(); updateRowNumbers(); calculateTotal(); }

    let draggedRow = null;
    const tbody = document.getElementById('items-body');

    function attachDragEvents(tr) {
        const handle = tr.querySelector('.drag-handle');
        handle.addEventListener('mouseenter', () => tr.setAttribute('draggable', 'true'));
        handle.addEventListener('mouseleave', () => tr.removeAttribute('draggable'));
        
        tr.addEventListener('dragstart', (e) => {
            draggedRow = tr;
            setTimeout(() => tr.classList.add('dragging'), 0);
        });
        tr.addEventListener('dragend', () => {
            tr.classList.remove('dragging'); draggedRow = null; updateRowNumbers();
        });
    }

    tbody.addEventListener('dragover', e => {
        e.preventDefault();
        if (!draggedRow) return;
        const afterElement = getDragAfterElement(tbody, e.clientY);
        if (afterElement == null) { tbody.appendChild(draggedRow); } 
        else { tbody.insertBefore(draggedRow, afterElement); }
    });

    function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.item-row:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) { return { offset: offset, element: child }; } 
            else { return closest; }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function saveData() {
        const data = {
            docType: document.getElementById('docType').innerText,
            docNum: document.getElementById('doc-num').value,
            docDate: document.getElementById('doc-date').value,
            dueDate: document.getElementById('due-date').value,
            customerName: document.getElementById('customer-name').value,
            customerAddress: document.getElementById('customer-address').value,
            incVat: false,
            items: []
        };

        document.querySelectorAll('#items-body tr').forEach(tr => {
            data.items.push({
                desc: tr.querySelector('.editable-desc').innerText,
                qty: tr.querySelector('.qty').value,
                unit: tr.querySelector('.unit-select').value,
                price: tr.querySelector('.price').value
            });
        });

        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
        const dlAnchorElem = document.createElement('a');
        dlAnchorElem.setAttribute("href", dataStr);
        dlAnchorElem.setAttribute("download", (data.docNum || "Document") + "_SaveData.json");
        document.body.appendChild(dlAnchorElem);
        dlAnchorElem.click();
        dlAnchorElem.remove();
        alert("บันทึกไฟล์งานสำเร็จ!");
    }

    function loadData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                document.getElementById('docType').innerText = data.docType || "ใบเสนอราคา";
                document.getElementById('doc-num').value = data.docNum || "";
                document.getElementById('doc-date').value = data.docDate || "";
                document.getElementById('due-date').value = data.dueDate || "";
                document.getElementById('customer-name').value = data.customerName || "";
                document.getElementById('customer-address').value = data.customerAddress || "";

                const tbody = document.getElementById('items-body');
                tbody.innerHTML = '';
                
                if(data.items && data.items.length > 0) {
                    data.items.forEach(item => addRow(item));
                } else {
                    addRow(); 
                }
                updateDocTypeSync();
                calculateTotal();
            } catch (err) {
                alert("ไฟล์ไม่ถูกต้อง หรือเสียหายครับ");
            }
        };
        reader.readAsText(file);
        event.target.value = ''; 
    }

    function exportToExcel() {
        if (typeof XLSX === 'undefined') {
            alert('กำลังโหลดข้อมูลสำหรับการสร้าง Excel กรุณารอสักครู่แล้วกดใหม่อีกครั้ง');
            return;
        }

        const docType = document.getElementById('docType').innerText;
        const docNum = document.getElementById('doc-num').value;
        const docDate = document.getElementById('doc-date').value;
        const dueDate = document.getElementById('due-date').value;
        const customerName = document.getElementById('customer-name').value;
        const customerAddress = document.getElementById('customer-address').value;

        let excelData = [];
        
        excelData.push(["JN electric&Technology"]);
        excelData.push([docType]);
        excelData.push([]);
        excelData.push(["ลูกค้า (BILL TO):", customerName]);
        excelData.push(["ที่อยู่:", customerAddress]);
        excelData.push(["เลขที่เอกสาร:", docNum, "วันที่:", docDate]);
        if(dueDate) excelData.push(["ครบกำหนด:", dueDate]);
        
        excelData.push([]);

        excelData.push(["ลำดับ", "รายการ", "จำนวน", "หน่วย", "ราคา/หน่วย", "จำนวนเงิน"]);

        const rows = document.querySelectorAll('#items-body tr');
        let index = 1;
        rows.forEach(tr => {
            const desc = tr.querySelector('.editable-desc').innerText;
            const qty = parseFloat(tr.querySelector('.qty').value) || 0;
            const unit = tr.querySelector('.unit-select').value;
            const price = parseFloat(tr.querySelector('.price').value) || 0;
            const total = qty * price;
            
            excelData.push([index++, desc, qty, unit, price, total]);
        });

        const grandTotal = document.getElementById('grand-total').innerText.replace(/,/g, '');
        excelData.push([]);
        excelData.push(["", "", "", "", "ยอดชำระสุทธิ (TOTAL)", parseFloat(grandTotal)]);

        const ws = XLSX.utils.aoa_to_sheet(excelData);
        
        ws['!cols'] = [
            { wch: 8 },  
            { wch: 40 }, 
            { wch: 10 }, 
            { wch: 10 }, 
            { wch: 15 }, 
            { wch: 15 }  
        ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Document");

        const fileName = (docNum || "Document") + ".xlsx";
        XLSX.writeFile(wb, fileName);
    }

    window.onload = function() {
        checkSession();
        
        document.getElementById('doc-date').value = getTodayThai();
        if(document.getElementById('docType').innerText.trim() === "...") {
            document.getElementById('docType').innerText = "ใบเสนอราคา";
        }
        
        updateDocTypeSync(); 
        addRow(); 
        calculateTotal();

        document.getElementById("pass-input").addEventListener("keypress", function(e){
            if(e.key === "Enter") submitLogin();
        });
    };
</script>
